[file]
config=./secrets/config.xor
local_config=./secrets/local_config.xor
log_config=./configs/log.json
token=./secrets/token.xor
local_token=./secrets/local_token.xor
tesla_key=./secrets/tesla_private_key.pem
tesla_cert=./secrets/cert.pem
google_mail_secret=./secrets/gmail_client_secret.json
google_mail_token=./secrets/gmail_token.json
google_sheet_cred=./secrets/gsheet_credentials.json
log_filename=./logs/tesla.log

[cron]
charge_check=/usr/bin/timeout -k 60 300 python -u /home/pi/tesla/python/src/vehicle/charge.py --check=
climate_start=/usr/bin/timeout -k 60 300 python -u /home/pi/tesla/python/src/vehicle/climate.py --start=
climate_stop=/usr/bin/timeout -k 60 300 python -u /home/pi/tesla/python/src/vehicle/climate.py --stop=
software_update=/usr/bin/timeout -k 60 300 python -u /home/pi/tesla/python/src/vehicle/api.py --schedule_software_update=
redirect=>> /home/pi/tesla/python/logs/cron.log 2>&1

[uri]
tesla_base_proxy_url=https://localhost:4443
tesla_base_fleet_url=https://fleet-api.prd.na.vn.cloud.tesla.com
tesla_base_auth_url=https://fleet-auth.prd.vn.cloud.tesla.com/oauth2/v3/token
tesla_user_auth_url=https://auth.tesla.com/oauth2/v3/authorize?&locale=en-US&prompt=login&response_type=code&state=db4af3f87
tesladeveloper_redirect_uri=https://themonomers.github.io/tesla-fleet
openweathermap_base_url=https://api.openweathermap.org/data/3.0

[general]
timezone=America/Los_Angeles